<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Audit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Subscription Audit</h1>
  </header>

  <main>
    <section class="summary" aria-label="Spending Summary">
      <div class="summary-card">
        <span class="summary-label">Monthly</span>
        <span class="summary-value" id="total-monthly">$0.00</span>
      </div>
      <div class="summary-card">
        <span class="summary-label">Annual</span>
        <span class="summary-value" id="total-annual">$0.00</span>
      </div>
      <div class="summary-card" id="renewal-card">
        <span class="summary-label">Renewing Soon</span>
        <span class="summary-value" id="renewing-soon">0</span>
      </div>
    </section>

    <section class="controls" aria-label="Controls">
      <form id="add-form" novalidate>
        <fieldset>
          <legend>Add Subscription</legend>
          <div class="form-row">
            <label for="input-name">Name</label>
            <input
              type="text"
              id="input-name"
              placeholder="e.g. Netflix"
              autocomplete="off"
            />
          </div>
          <div class="form-row">
            <label for="input-amount">Amount ($)</label>
            <input
              type="number"
              id="input-amount"
              placeholder="e.g. 15.99"
              min="0.01"
              step="0.01"
            />
          </div>
          <div class="form-row">
            <label for="input-cycle">Cycle</label>
            <select id="input-cycle">
              <option value="weekly">Weekly</option>
              <option value="monthly" selected>Monthly</option>
              <option value="quarterly">Quarterly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
          <div class="form-row">
            <label for="input-renewal">Renewal Date</label>
            <input type="date" id="input-renewal" />
          </div>
          <p class="form-error" id="form-error" aria-live="polite"></p>
          <button type="submit" class="btn btn-primary">Add</button>
        </fieldset>
      </form>

      <div class="list-controls">
        <label for="sort-select">Sort by</label>
        <select id="sort-select">
          <option value="monthly">Monthly cost</option>
          <option value="renewal">Days until renewal</option>
        </select>
        <button type="button" id="reset-btn" class="btn btn-danger">Reset all</button>
      </div>
    </section>

    <section class="subscriptions" aria-label="Subscription list">
      <ul id="subscription-list" aria-live="polite"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
